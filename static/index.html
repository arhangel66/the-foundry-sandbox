<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
            position: relative;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.03) 0px,
                rgba(255, 255, 255, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
        }

        .calculator {
            background: #0a0a0a;
            border: 2px solid #fff;
            border-radius: 0;
            box-shadow: none;
            padding: 20px;
            width: 360px;
            position: relative;
            z-index: 2;
        }

        .display {
            background: #111;
            border: 1px solid #555;
            border-radius: 0;
            padding: 16px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #expression {
            font-size: 12px;
            color: #666;
            letter-spacing: 0.05em;
            font-weight: 400;
            min-height: 16px;
        }

        #result {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-align: right;
            word-break: break-all;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        #result.error {
            color: #fff;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"] {
            background: #000;
            border: 1px solid #555;
            border-radius: 0;
            padding: 8px 10px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #fff;
            background: #222;
        }

        input[type="number"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            background: #000;
            border: 1px solid #fff;
            border-radius: 0;
            padding: 12px 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        button:hover {
            background: #fff;
            border-color: #fff;
            color: #000;
        }

        button:active {
            transform: scale(0.95);
        }

        button.active {
            background: #fff;
            border-color: #fff;
            color: #000;
            font-weight: 900;
        }

        button.binary {
            color: #fff;
        }

        button.binary:hover {
            background: #fff;
            color: #000;
        }

        button.unary {
            color: #fff;
        }

        button.unary:hover {
            background: #fff;
            color: #000;
        }

        .title {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"]::placeholder {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">Engineering Calculator</div>

        <!-- Display -->
        <div class="display">
            <p id="expression">&nbsp;</p>
            <p id="result">0</p>
        </div>

        <!-- Inputs -->
        <div class="input-group">
            <div class="input-wrapper">
                <label for="operand1">X</label>
                <input
                    type="number"
                    id="operand1"
                    step="any"
                    placeholder="0"
                    autofocus
                />
            </div>
            <div class="input-wrapper">
                <label for="operand2">Y</label>
                <input
                    type="number"
                    id="operand2"
                    step="any"
                    placeholder="0"
                />
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Binary arithmetic -->
            <button class="op-btn binary" data-op="+" title="Addition">+</button>
            <button class="op-btn binary" data-op="−" title="Subtraction">−</button>
            <button class="op-btn binary" data-op="×" title="Multiplication">×</button>
            <button class="op-btn binary" data-op="÷" title="Division">÷</button>

            <!-- Binary advanced -->
            <button class="op-btn binary" data-op="**" title="Power">x^y</button>
            <button class="op-btn binary" data-op="%" title="Modulo">%</button>

            <!-- Unary functions -->
            <button class="op-btn unary" data-op="sqrt" title="Square Root">√x</button>
            <button class="op-btn unary" data-op="log" title="Log10">log</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
