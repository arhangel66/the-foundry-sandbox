<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d0d0d0;
        }

        .calculator {
            background: #111;
            border: 2px solid #aaa;
            border-radius: 0;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05), 4px 4px 0 #333;
            padding: 24px;
            width: 360px;
        }

        .display {
            background: #000;
            border: 2px solid #666;
            border-radius: 0;
            padding: 16px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* CRT scanline effect */
        .display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
        }

        #expression {
            font-size: 12px;
            color: #666;
            letter-spacing: 0.05em;
            font-weight: 400;
            min-height: 16px;
        }

        #result {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-align: right;
            word-break: break-all;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        #result.error {
            color: #bbb;
            font-size: 14px;
            text-shadow: none;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"] {
            background: #000;
            border: 1px solid #555;
            border-radius: 0;
            padding: 8px 10px;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            text-align: center;
            transition: border-color 0.1s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #fff;
        }

        input[type="number"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #555;
            border-radius: 0;
            padding: 12px 8px;
            color: #bbb;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.1s ease, color 0.1s ease, border-color 0.1s ease;
            user-select: none;
        }

        button:hover {
            background: #2a2a2a;
            border-color: #ccc;
            color: #fff;
        }

        button:active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        button.active {
            background: #fff;
            border-color: #fff;
            color: #000;
        }

        button.binary {
            color: #ccc;
        }

        button.unary {
            color: #ccc;
        }

        .title {
            font-size: 13px;
            color: #777;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 700;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        input[type="number"]::placeholder {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">Engineering Calculator</div>

        <!-- Display -->
        <div class="display">
            <p id="expression">&nbsp;</p>
            <p id="result">0</p>
        </div>

        <!-- Inputs -->
        <div class="input-group">
            <div class="input-wrapper">
                <label for="operand1">X</label>
                <input
                    type="number"
                    id="operand1"
                    step="any"
                    placeholder="0"
                    autofocus
                />
            </div>
            <div class="input-wrapper">
                <label for="operand2">Y</label>
                <input
                    type="number"
                    id="operand2"
                    step="any"
                    placeholder="0"
                />
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Binary arithmetic -->
            <button class="op-btn binary" data-op="+" title="Addition">+</button>
            <button class="op-btn binary" data-op="−" title="Subtraction">−</button>
            <button class="op-btn binary" data-op="×" title="Multiplication">×</button>
            <button class="op-btn binary" data-op="÷" title="Division">÷</button>

            <!-- Binary advanced -->
            <button class="op-btn binary" data-op="**" title="Power">x^y</button>
            <button class="op-btn binary" data-op="%" title="Modulo">%</button>

            <!-- Unary functions -->
            <button class="op-btn unary" data-op="sqrt" title="Square Root">√x</button>
            <button class="op-btn unary" data-op="log" title="Log10">log</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
