<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-96">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Calculator</h1>

        <form id="calculatorForm" class="space-y-6">
            <div>
                <label for="operand1" class="block text-sm font-medium text-gray-700 mb-2">First Number</label>
                <input
                    type="number"
                    id="operand1"
                    name="operand1"
                    step="any"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter first number"
                />
            </div>

            <div>
                <label for="operation" class="block text-sm font-medium text-gray-700 mb-2">Operation</label>
                <select
                    id="operation"
                    name="operation"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="">Select operation</option>
                    <option value="+">Addition (+)</option>
                    <option value="-">Subtraction (-)</option>
                    <option value="*">Multiplication (*)</option>
                    <option value="/">Division (/)</option>
                </select>
            </div>

            <div>
                <label for="operand2" class="block text-sm font-medium text-gray-700 mb-2">Second Number</label>
                <input
                    type="number"
                    id="operand2"
                    name="operand2"
                    step="any"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter second number"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200"
            >
                Calculate
            </button>
        </form>

        <div id="resultContainer" class="mt-8 hidden">
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg">
                <p class="text-sm text-gray-600">Result:</p>
                <p id="resultValue" class="text-3xl font-bold"></p>
            </div>
        </div>

        <div id="errorContainer" class="mt-8 hidden">
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg">
                <p class="text-sm text-gray-600">Error:</p>
                <p id="errorMessage"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
