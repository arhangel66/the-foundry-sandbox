<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9d1d9;
        }

        .calculator {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            padding: 20px;
            width: 360px;
        }

        .display {
            background: linear-gradient(135deg, #0a0e14 0%, #0d1117 100%);
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #expression {
            font-size: 12px;
            color: #6e7681;
            letter-spacing: 0.05em;
            font-weight: 400;
            min-height: 16px;
        }

        #result {
            font-size: 32px;
            font-weight: 700;
            color: #58a6ff;
            text-align: right;
            word-break: break-all;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        #result.error {
            color: #f85149;
            font-size: 14px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #6e7681;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"] {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 8px 10px;
            color: #58a6ff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1);
        }

        input[type="number"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 12px 8px;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        button:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        button:active {
            transform: scale(0.95);
            background: #1f2937;
        }

        button.active {
            background: #0d419e;
            border-color: #58a6ff;
            color: #58a6ff;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.2);
        }

        button.binary {
            color: #58a6ff;
        }

        button.binary:hover {
            background: #1f4788;
        }

        button.unary {
            color: #3fb950;
        }

        button.unary:hover {
            background: #1f4e1a;
        }

        .title {
            font-size: 14px;
            color: #6e7681;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"]::placeholder {
            color: #3d444d;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">Engineering Calculator</div>

        <!-- Display -->
        <div class="display">
            <p id="expression">&nbsp;</p>
            <p id="result">0</p>
        </div>

        <!-- Inputs -->
        <div class="input-group">
            <div class="input-wrapper">
                <label for="operand1">X</label>
                <input
                    type="number"
                    id="operand1"
                    step="any"
                    placeholder="0"
                    autofocus
                />
            </div>
            <div class="input-wrapper">
                <label for="operand2">Y</label>
                <input
                    type="number"
                    id="operand2"
                    step="any"
                    placeholder="0"
                />
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Binary arithmetic -->
            <button class="op-btn binary" data-op="+" title="Addition">+</button>
            <button class="op-btn binary" data-op="−" title="Subtraction">−</button>
            <button class="op-btn binary" data-op="×" title="Multiplication">×</button>
            <button class="op-btn binary" data-op="÷" title="Division">÷</button>

            <!-- Binary advanced -->
            <button class="op-btn binary" data-op="**" title="Power">x^y</button>
            <button class="op-btn binary" data-op="%" title="Modulo">%</button>

            <!-- Unary functions -->
            <button class="op-btn unary" data-op="sqrt" title="Square Root">√x</button>
            <button class="op-btn unary" data-op="log" title="Log10">log</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
