<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO CALC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            /* scanline overlay */
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.02) 2px,
                rgba(255,255,255,0.02) 4px
            );
        }

        .calculator {
            background: #000;
            border: 2px solid #fff;
            border-radius: 0;
            box-shadow: 4px 4px 0 #fff;
            padding: 20px;
            width: 360px;
        }

        .display {
            background: #000;
            border: 2px solid #fff;
            border-radius: 0;
            padding: 16px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #expression {
            font-size: 12px;
            color: #888;
            letter-spacing: 0.05em;
            font-weight: 400;
            min-height: 16px;
        }

        #result {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-align: right;
            word-break: break-all;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        #result.error {
            color: #fff;
            font-size: 14px;
            text-decoration: underline;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        input[type="number"] {
            background: #000;
            border: 1px solid #fff;
            border-radius: 0;
            padding: 8px 10px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
            transition: none;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 2px 2px 0 #fff;
        }

        input[type="number"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
        }

        button {
            background: #000;
            border: 1px solid #fff;
            border-radius: 0;
            padding: 12px 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: none;
            user-select: none;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        button:active {
            background: #ccc;
            color: #000;
        }

        button.active {
            background: #fff;
            border-color: #fff;
            color: #000;
        }

        button.binary {
            color: #fff;
        }

        button.unary {
            color: #ccc;
            border-style: dashed;
        }

        .title {
            font-size: 13px;
            color: #fff;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 700;
            border-bottom: 1px solid #444;
            padding-bottom: 12px;
        }

        input[type="number"]::placeholder {
            color: #444;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">[ CALC v1.0 ]</div>

        <!-- Display -->
        <div class="display">
            <p id="expression">&nbsp;</p>
            <p id="result">0</p>
        </div>

        <!-- Inputs -->
        <div class="input-group">
            <div class="input-wrapper">
                <label for="operand1">X</label>
                <input
                    type="number"
                    id="operand1"
                    step="any"
                    placeholder="0"
                    autofocus
                />
            </div>
            <div class="input-wrapper">
                <label for="operand2">Y</label>
                <input
                    type="number"
                    id="operand2"
                    step="any"
                    placeholder="0"
                />
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Binary arithmetic -->
            <button class="op-btn binary" data-op="+" title="Addition">+</button>
            <button class="op-btn binary" data-op="−" title="Subtraction">−</button>
            <button class="op-btn binary" data-op="×" title="Multiplication">×</button>
            <button class="op-btn binary" data-op="÷" title="Division">÷</button>

            <!-- Binary advanced -->
            <button class="op-btn binary" data-op="**" title="Power">x^y</button>
            <button class="op-btn binary" data-op="%" title="Modulo">%</button>

            <!-- Unary functions -->
            <button class="op-btn unary" data-op="sqrt" title="Square Root">√x</button>
            <button class="op-btn unary" data-op="log" title="Log10">log</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
